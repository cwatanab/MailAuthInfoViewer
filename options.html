<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  /* DESIGN.md — Apple design tokens adapted for options page */
  :root {
    /* Brand & Accent */
    --primary: #0066cc;
    --primary-focus: #0071e3;
    --primary-on-dark: #2997ff;
    --on-primary: #ffffff;
    --danger: #d70015;
    --danger-bg: #fff2f2;
    --success: #248a3d;

    /* Surfaces */
    --canvas: #ffffff;
    --canvas-parchment: #f5f5f7;
    --surface-pearl: #fafafc;
    --ink: #1d1d1f;
    --ink-muted-80: #333333;
    --ink-muted-48: #7a7a7a;

    /* Hairlines & Borders */
    --hairline: #e0e0e0;
    --divider-soft: #f0f0f0;

    /* Spacing Scale */
    --spacing-xxs: 4px;
    --spacing-xs: 8px;
    --spacing-sm: 12px;
    --spacing-md: 17px;
    --spacing-lg: 24px;
    --spacing-xl: 32px;
    --spacing-xxl: 48px;

    /* Border Radius Scale */
    --radius-none: 0px;
    --radius-xs: 5px;
    --radius-sm: 8px;
    --radius-md: 11px;
    --radius-lg: 18px;
    --radius-pill: 9999px;

    /* Fonts & Typography Profiles */
    --font: "SF Pro Text", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --font-display: "SF Pro Display", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --font-mono: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --primary: #2997ff;
      --primary-focus: #2997ff;
      --ink: #ffffff;
      --ink-muted-80: #cccccc;
      --ink-muted-48: #a1a1a6;
      --canvas: #2a2a2c;
      --canvas-parchment: #272729;
      --surface-pearl: #252527;
      --hairline: #3a3a3c;
      --divider-soft: #333335;
      --on-primary: #ffffff;
      --danger: #ff453a;
      --danger-bg: #3a1515;
      --success: #30d158;
    }
  }

  * { box-sizing: border-box; }

  body {
    font-family: var(--font);
    max-width: 600px;
    margin: var(--spacing-lg) auto;
    padding: 0 var(--spacing-sm);
    color: var(--ink);
    background: var(--canvas-parchment);
    /* DESIGN.md: body (17px, 400, 1.47, -0.374px) */
    font-size: 17px;
    font-weight: 400;
    line-height: 1.47;
    letter-spacing: -0.374px;
  }

  h1 {
    font-family: var(--font-display);
    /* DESIGN.md: display-md (34px, 600, 1.47, -0.374px) */
    font-size: 34px;
    font-weight: 600;
    line-height: 1.47;
    letter-spacing: -0.374px;
    border-bottom: 1px solid var(--hairline);
    padding-bottom: var(--spacing-xs);
    margin: 0 0 var(--spacing-sm) 0;
    color: var(--ink);
  }

  h2 {
    font-family: var(--font-display);
    /* DESIGN.md: tagline (21px, 600, 1.19, 0.231px) */
    font-size: 21px;
    font-weight: 600;
    line-height: 1.19;
    letter-spacing: 0.231px;
    margin: var(--spacing-md) 0 var(--spacing-xxs) 0;
    color: var(--ink);
  }

  p.desc {
    /* DESIGN.md: caption (14px, 400, 1.43, -0.224px) */
    font-size: 14px;
    font-weight: 400;
    line-height: 1.43;
    letter-spacing: -0.224px;
    color: var(--ink-muted-48);
    margin: 0 0 var(--spacing-xs) 0;
  }

  .add-row {
    display: flex;
    gap: var(--spacing-xxs);
    margin-bottom: var(--spacing-xs);
  }

  .add-row input {
    flex: 1;
    /* DESIGN.md: search-input (height 44px, pill, padding 12px 20px) */
    padding: 12px 20px;
    font-size: 17px; /* body */
    font-family: var(--font);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-pill);
    background: var(--canvas);
    color: var(--ink);
    outline: none;
    height: 44px;
    line-height: 1.47;
    letter-spacing: -0.374px;
  }

  .add-row input:focus {
    border-color: var(--primary-focus);
    outline: 2px solid var(--primary-focus);
    outline-offset: 1px;
  }

  /* DESIGN.md: button-pearl-capsule (secondary/utility cards default style) */
  button {
    background: var(--surface-pearl);
    color: var(--ink-muted-80);
    font-family: var(--font);
    /* DESIGN.md: caption (14px, 400, 1.43, -0.224px) */
    font-size: 14px;
    font-weight: 400;
    line-height: 1.43;
    letter-spacing: -0.224px;
    border: 3px solid var(--divider-soft);
    border-radius: var(--radius-md); /* 11px */
    padding: 8px 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.1s ease;
  }

  button:active { transform: scale(0.95); }

  button:focus-visible {
    outline: 2px solid var(--primary-focus);
    outline-offset: 2px;
  }

  /* DESIGN.md: button-primary (pill, Action Blue, body 17px font) */
  button.primary {
    background: var(--primary);
    color: var(--on-primary);
    border-color: var(--primary);
    border-radius: var(--radius-pill);
    padding: 11px 22px;
    height: 44px;
    font-size: 17px; /* body */
    font-weight: 400;
    line-height: 1.47;
    letter-spacing: -0.374px;
  }

  /* DESIGN.md: button-secondary-pill adapted for danger */
  button.danger {
    color: var(--danger);
    border-color: var(--danger);
    border-width: 1px;
    background: transparent;
    font-size: 14px;
    line-height: 1.0;
    padding: 6px 10px;
    border-radius: var(--radius-md); /* 11px */
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  button.danger:hover { background: var(--danger-bg); }

  .domain-list {
    /* DESIGN.md: store-utility-card chassis (canvas, hairline, rounded.lg) */
    border: 1px solid var(--hairline);
    border-radius: var(--radius-lg);
    overflow: hidden;
    min-height: 48px;
    background: var(--canvas);
  }

  .domain-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--spacing-xs) var(--spacing-sm);
    border-bottom: 1px solid var(--divider-soft);
    font-size: 14px;
    font-family: var(--font-mono);
    color: var(--ink);
  }

  .domain-item:last-child { border-bottom: none; }
  .domain-item:nth-child(even) { background: var(--surface-pearl); }

  .empty {
    padding: var(--spacing-md);
    text-align: center;
    color: var(--ink-muted-48);
    font-size: 14px;
    font-style: italic;
  }

  .actions {
    display: flex;
    gap: var(--spacing-xs);
    margin-top: var(--spacing-xs);
  }

  .status {
    /* DESIGN.md: fine-print */
    font-size: 12px;
    line-height: 1.0;
    letter-spacing: -0.12px;
    color: var(--success);
    margin-top: var(--spacing-xs);
    min-height: 18px;
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: var(--spacing-xs);
    margin-bottom: var(--spacing-xs);
    cursor: pointer;
  }

  .checkbox-row input {
    width: 18px;
    height: 18px;
    margin: 0;
    cursor: pointer;
    accent-color: var(--primary);
    flex-shrink: 0;
  }

  .checkbox-row span {
    font-size: 17px; /* body */
    color: var(--ink);
  }
</style>
</head>
<body>
  <h1 id="title"></h1>

  <h2 id="displayTitle"></h2>
  <p class="desc" id="displayDesc"></p>
  <label class="checkbox-row">
    <input type="checkbox" id="compactMode">
    <span id="compactLabel"></span>
  </label>

  <h2 id="whitelistTitle"></h2>
  <p class="desc" id="whitelistDesc"></p>

  <div class="add-row">
    <input type="text" id="domainInput" placeholder="example.com">
    <button class="primary" id="addBtn"></button>
  </div>

  <div class="domain-list" id="domainList"></div>

  <div class="actions">
    <button id="exportBtn"></button>
    <button id="importBtn"></button>
    <input type="file" id="importFile" accept=".txt,.text" style="display:none;">
  </div>
  <div class="status" id="status"></div>

  <script src="options.js"></script>
</body>
</html>
